<!DOCTYPE html>
<html>
<head>
  <title>Battleship</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <div id="player1-board"></div>
    <div id="player2-board"></div>
  </div>
  <div id="menu">
    <h2>Player 1: Place Your Ships</h2>
    <ul>
      <li>Aircraft Carrier (5): <button id="carrier" class="ship-button">Choose</button></li>
      <li>Battleship (4): <button id="battleship" class="ship-button">Choose</button></li>
      <li>Cruiser (3): <button id="cruiser" class="ship-button">Choose</button></li>
      <li>Submarine (3): <button id="submarine" class="ship-button">Choose</button></li>
      <li>Destroyer (2): <button id="destroyer" class="ship-button">Choose</button></li>
    </ul>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
